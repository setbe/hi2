name: Deploy Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          for layer in a b c d; do
            if [ -d "${layer}/docs" ]; then
              mkdir -p "_site/${layer}"
              cp -R "${layer}/docs" "_site/${layer}/"
            fi
          done

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>abcd docs</title>
            <style>
              body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; line-height: 1.4; }
              h1 { margin-bottom: 0.5rem; }
              ul { padding-left: 1.2rem; }
              a { text-decoration: none; }
              a:hover { text-decoration: underline; }
              .muted { color: #555; }
            </style>
          </head>
          <body>
            <h1>abcd documentation</h1>
            <p class="muted">Freestanding layered docs published from a/b/c/d.</p>
            <ul>
              <li><a href="./a/docs/index.html">a:: docs</a></li>
              <li><a href="./b/docs/index.html">b:: docs</a></li>
              <li><a href="./c/docs/index.html">c:: docs</a></li>
              <li><a href="./d/docs/index.html">d:: docs</a></li>
            </ul>
          </body>
          </html>
          HTML

          # Ensure GitHub Pages does not try any Jekyll transformation.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
